name: Pipeline CI/CD

on:
  push:
   branches: 
    - main

jobs:
  job1:
    name: build_ecr
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: "Configure AWS Credentials"
        uses: aws-actions/configure-aws-credentials@v4
        with: 
          role-to-assume: arn:aws:iam::890871562295:role/GithubActionsRepoApp 
          aws-region: us-east-2

      - name: Amazon ECR "Login" Action for GitHub Actions
        uses: aws-actions/amazon-ecr-login@v2.0.1

      - name: Build, Tag, and push image to Amazon ECR
        run:
          docker build -t guinho-lab:v1.0
          docker tag guinho-lab:v1.0 890871562295.dkr.ecr.us-east-2.amazonaws.com/ecr-lab-guinho:v1.0
          docker push 890871562295.dkr.ecr.us-east-2.amazonaws.com/ecr-lab-guinho:v1.0

  job2:
    name: deploy_ec2
    needs: job1
    env:
      INSTANCE_KEY: ${{secrets.INSTANCE_KEY}}
      PUBLIC_IP: ${{secrets.PUBLIC_IP}}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy EC2 SSH
        run: |
          echo "$INSTANCE_KEY" > chave-ssh.pem
          chmod 400 chave-ssh.pem
          ssh -i chave-ssh.pem -o StrictHostKeyChecking=no ec2-user@$PUBLIC_IP << EOF
            aws ecr get-login-password --region us-east-2 | docker login --username AWS --password-stdin 890871562295.dkr.ecr.us-east-2.amazonaws.com
            docker pull 890871562295.dkr.ecr.us-east-2.amazonaws.com/ecr-lab-guinho:v1.0
            echo "parando container antigo site"
            docker stop site || true
            echo "removendo container antigo site"
            docker rm site || true
            echo "rodando nova tag da imagem"
            docker run -d -p 80:80 --name site 890871562295.dkr.ecr.us-east-2.amazonaws.com/ecr-lab-guinho:v1.0
            echo "Parabéns! Imagem foi atualizada!"
            docker ps
          EOF
          rm chave-ssh.pem
